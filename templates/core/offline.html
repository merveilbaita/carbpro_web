<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors-ligne — CarbPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1A3A6B 0%, #2e5ba8 100%);
      min-height: 100vh; display: flex; align-items: center;
    }
    .card { border-radius: 18px; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6">
      <div class="card shadow-lg p-4 text-center">
        <div class="mb-3" style="font-size:5rem">📶</div>
        <h3 class="fw-bold text-danger mb-2">Vous êtes hors-ligne</h3>
        <p class="text-muted mb-4">
          Cette page n'est pas disponible sans connexion.<br>
          Les formulaires de saisie (entrée stock, appro engin) fonctionnent hors-ligne.
        </p>
        <div class="d-grid gap-2">
          <a href="/ravitaillement/" class="btn btn-primary btn-lg">
            <i class="bi bi-truck"></i> Saisir une entrée carburant
          </a>
          <a href="/appro-engin/" class="btn btn-success btn-lg">
            <i class="bi bi-gear-fill"></i> Ravitailler un engin
          </a>
          <a href="/consommation-diverse/" class="btn btn-warning btn-lg text-dark">
            <i class="bi bi-droplet-fill"></i> Consommation diverse
          </a>
          <button onclick="location.reload()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-clockwise"></i> Réessayer
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
